<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clock Weather Display</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <main class="app-shell">
    <section class="clock-stage" aria-label="Analog weather clock">
      <div class="clock-face">
        <div id="day" class="day-label">Thursday</div>
        <div id="date-short" class="date-short">Mar 19</div>

        <div id="tick-ring" class="tick-ring" aria-hidden="true"></div>
        <div id="hour-ring" class="hour-ring" aria-hidden="true"></div>
        <img id="current-icon" class="weather-icon weather-icon-bg" src="assets/icons/partlycloudy-day.svg" alt="Weather icon"/>

        <div class="center-display">
          <div id="current-temp" class="current-temp">52°</div>
          <div id="high-low" class="high-low">H:61°&nbsp;&nbsp;L:48°</div>
        </div>

        <div id="hour-hand" class="hand hour-hand" aria-hidden="true"></div>
        <div id="minute-hand" class="hand minute-hand" aria-hidden="true"></div>
        <div class="center-cap" aria-hidden="true"></div>
      </div>
    </section>
  </main>

  <script src="renderer/clock.js"></script>
  <script src="renderer/weather.js"></script>
</body>
</html>
